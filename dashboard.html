
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sync Dashboard</title>
<style>
body{font-family:Arial;background:#0f172a;color:white}
.card{background:#1f2937;margin:10px;padding:10px;border-radius:10px}
button{padding:6px;background:limegreen;border:none}
</style>
</head>
<body>

<h2>Discord + DB Sync Dashboard</h2>
<div id="box"></div>

<script>
async function load(){
  const r = await fetch("/requests");
  const d = await r.json();

  box.innerHTML = d.map(x=>`
    <div class="card">
      <b>${x.name}</b><br>
      ${x.email}<br>
      ${x.id}<br>
      ${x.status}<br>
      ${x.note}<br>
      <button onclick="done('${x.id}')">Complete</button>
    </div>
  `).join("");
}

async function done(id){
  await fetch("/complete/"+id,{method:"POST"});
  load();
}

setInterval(load,3000);
load();
</script>

</body>
</html>
